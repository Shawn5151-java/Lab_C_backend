# ==================== Server ====================
server.port=8080

# ==================== MySQL ====================
spring.datasource.url=jdbc:mysql://localhost:3306/feirui_db?useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
spring.datasource.username=root
# Change this to your MySQL password
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / Hibernate ====================
# validate: check entity vs DB on startup (use 'update' during first run to auto-create tables)
# update = auto create/alter tables on startup (use for development only)
# validate = only verify structure, never modify (switch to this after tables are stable)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== AES Encryption ====================
# secret-key: must be exactly 32 characters (32 bytes = AES-256)
# init-vector: must be exactly 16 characters (16 bytes = AES CBC IV)
app.encryption.secret-key=FeiRui2025SecretKey!@#$%^&*ABCDE
app.encryption.init-vector=FeiRuiIV12345678

# ==================== JWT ====================
# secret: signing key, at least 64 characters recommended
# expiration-ms: token validity in milliseconds (86400000 = 24h)
app.jwt.secret=FeiRui2025JwtSecretKeyForSigningTokensDoNotShareThisKey!!
app.jwt.expiration-ms=86400000

# ==================== File Upload ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
